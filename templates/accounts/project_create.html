{# -*- coding: utf-8 -*- #}
{# templates/accounts/project_create.html #}
{% extends "base.html" %}
{% block title %}Create Project — Reasoning Workbench{% endblock %}

{% block content %}
<div class="rw-main-inner">
  <div class="rw-breadcrumbs d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-house"></i>
      <span class="text-secondary">Create project</span>
    </div>
  </div>

  <div class="rw-workarea">
    <div class="rw-pane">
      <div class="rw-pane-header">
        <div class="fw-semibold">New Project</div>
      </div>

      <div class="rw-pane-body p-3">
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-primary" type="submit">Create</button>
            <a class="btn btn-sm btn-outline-secondary" href="{% url 'accounts:dashboard' %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  const flow = document.getElementById("id_project_flow");
  const workflow = document.getElementById("id_workflow_mode");
  const kind = document.getElementById("id_kind");
  const primary = document.getElementById("id_primary_type");
  const mode = document.getElementById("id_mode");
  const primaryRow = primary ? primary.closest("p") : null;
  const modeRow = mode ? mode.closest("p") : null;
  const contributors = document.getElementById("id_contributors");
  const contributorsRow = contributors ? contributors.closest("p") : null;

  function applyFlow() {
    const value = flow ? flow.value : "MANAGED";
    const isSandbox = value === "SANDBOX";
    const isDerax = value === "DERAX";
    const isManaged = !isSandbox && !isDerax;

    if (kind) kind.value = isSandbox ? "SANDBOX" : "STANDARD";
    if (workflow) {
      if (isDerax) workflow.value = "DERAX_WORK";
      else workflow.value = "PDE";
    }

    if (primaryRow) primaryRow.style.display = isManaged ? "" : "none";
    if (modeRow) modeRow.style.display = isManaged ? "" : "none";
    if (contributorsRow) contributorsRow.style.display = isSandbox ? "none" : "";
    if (!isManaged) {
      if (primary) primary.value = "DELIVERY";
      if (mode) mode.value = "PLAN";
    }
  }

  if (flow) {
    flow.addEventListener("change", applyFlow);
  }
  applyFlow();
})();
</script>

{% endblock %}
