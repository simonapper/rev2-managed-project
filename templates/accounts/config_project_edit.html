{# -*- coding: utf-8 -*- #}
{# templates/accounts/config_project_edit.html #}
{% extends "base.html" %}

{% block content %}
<div class="container-fluid px-4 py-4">
    <h5>Edit Project</h5>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Project Name</label>
            <input type="text" name="name" class="form-control" value="{{ project.name }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control">{{ project.description }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Workflow mode</label>
            <select name="workflow_mode" class="form-select">
                <option value="PDE" {% if project.workflow_mode == "PDE" %}selected{% endif %}>PDE</option>
                <option value="DERAX_WORK" {% if project.workflow_mode == "DERAX_WORK" %}selected{% endif %}>DERAX work</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'accounts:project_config_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
